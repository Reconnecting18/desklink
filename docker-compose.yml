version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: desklink-db
    environment:
      POSTGRES_USER: desklink
      POSTGRES_PASSWORD: desklink
      POSTGRES_DB: desklink
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: desklink-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:

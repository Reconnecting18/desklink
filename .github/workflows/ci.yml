name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: desklink
          POSTGRES_PASSWORD: desklink
          POSTGRES_DB: desklink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U desklink -d desklink_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://desklink:desklink@localhost:5432/desklink_test
      JWT_SECRET: ci-jwt-secret-minimum-16-chars

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prisma migrate
        run: npx prisma migrate deploy --config prisma/prisma.config.ts
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
